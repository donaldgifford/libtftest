# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Aligned with git-workflow:commit types. Generated from the
# git-cliff:git-cliff-init starter template (Phase 10 of IMPL-0005).

[changelog]
header = """
# Changelog

All notable changes to libtftest are documented here. The format is
based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and
this project adheres to [Semantic Versioning](https://semver.org/).
While the library is pre-1.0, minor-version bumps may contain
breaking changes; the API freeze begins at v1.0.

This file is regenerated from conventional commits by `git-cliff`.
Manual edits will be overwritten by the `Changelog Sync` job in the
`Release` workflow after each tagged release — author release notes
via conventional commit subjects and bodies instead.

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

trim = true
render_always = true

postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/donaldgifford/libtftest" },
]

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
fail_on_unmatched_commit = false
topo_order = false
sort_commits = "oldest"

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
]

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs?", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci|^build|^meta|^license", group = "<!-- 6 -->Miscellaneous Tasks" },
  { message = "^style", group = "<!-- 7 -->Styling" },
  { body = ".*security", group = "<!-- 8 -->Security" },
  { message = "^revert", group = "<!-- 9 -->Revert" },
  { message = ".*", group = "<!-- 10 -->Other" },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "<REPO>/issues/$1" },
]
