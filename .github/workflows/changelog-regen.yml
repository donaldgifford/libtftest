---
# $schema=https://schemastore.org/https://www.schemastore.org/github-action.json
name: Changelog Regen
on:
  push:
    branches: [main]
  workflow_dispatch:

# Loop guard: skip if the head commit is itself a chore(changelog)
# auto-sync. cliff.toml also skips these via commit_parsers, so even
# if this guard were missing, the regenerated output wouldn't include
# the bot's own commits — but skipping the run avoids the wasted CI cycle.
jobs:
  regen:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(changelog)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          # Use the default GITHUB_TOKEN so the push uses bot credentials;
          # `permissions: contents: write` above is required for it to push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up mise (for git-cliff)
        uses: jdx/mise-action@v3
        with:
          experimental: true

      - name: Regenerate CHANGELOG.md
        run: |
          git fetch --tags origin
          git-cliff -o CHANGELOG.md

      - name: Commit and push if changed
        run: |-
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md is up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): Auto-sync"
          git push origin HEAD:main
